name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend-lint:
    name: Backend · lint (ruff + black)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install linters
        run: pip install ruff==0.14.4 black==25.9.0
      - name: ruff
        run: ruff check .
      - name: black
        run: black --check .

  backend-test:
    name: Backend · tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    env:
      APP_CONFIG__RUN__HOST: 0.0.0.0
      APP_CONFIG__RUN__PORT: "8000"
      APP_CONFIG__DB__URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      APP_CONFIG__LLM__API_KEY: test-key
      APP_CONFIG__LLM__API_BASE: https://openrouter.ai/api/v1
      APP_CONFIG__LLM__DEFAULT_MODEL: openai/gpt-oss-20b:free
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: >-
          pip install
          "sqlalchemy[asyncio]" asyncpg greenlet inflect bcrypt
          pydantic pydantic-settings python-dotenv openai pgvector
          fpdf2 pypdf pytest pytest-asyncio
      - name: Run tests
        run: pytest -q

  frontend-build:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
