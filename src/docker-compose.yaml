services:
  backend:
    build:
      dockerfile: DockerBuild/backend/Dockerfile
      context: ./
    depends_on:
      pg:
        condition: service_healthy
    env_file:
      - ./backend/.env.app_config
    ports:
      - 8000:8000
    volumes:
      - ./backend:/backend
    restart: unless-stopped
    networks:
      - app-net

  frontend:
    build:
      dockerfile: DockerBuild/frontend/Dockerfile
      context: ./
    volumes:
      - ./frontend:/frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app-net

  pg:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
